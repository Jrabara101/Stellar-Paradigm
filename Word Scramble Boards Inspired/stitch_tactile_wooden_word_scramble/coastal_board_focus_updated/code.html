<style>
        .wood-texture {
            background-color: #8a8883; /* Driftwood base */
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px),
                radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.2) 100%);
            background-size: 20px 20px, 20px 20px, 100% 100%;
        }
        
        .sand-texture {
            background-color: #d2c8b8; /* Sand base */
            background-image: url('https://www.transparenttextures.com/patterns/sandpaper.png');
        }

        .routed-slot {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), inset -1px -1px 2px rgba(255,255,255,0.1);
        }

        .sea-stone-tile {
            background: linear-gradient(135deg, #e0e0e0 0%, #b8b8b8 100%);
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3), inset -1px -2px 3px rgba(0,0,0,0.2), inset 1px 2px 3px rgba(255,255,255,0.8);
            border-radius: 40% 60% 50% 50% / 50% 40% 60% 50%; /* Organic stone shape */
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.2s;
        }

        .sea-stone-tile:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 1px 2px 3px rgba(0,0,0,0.3), inset -1px -1px 2px rgba(0,0,0,0.2), inset 1px 1px 2px rgba(255,255,255,0.8);
        }
        
        .copper-button {
            background: linear-gradient(to bottom, #b87333, #8b4513);
            box-shadow: 0 4px 0 #5c2e0b, 0 6px 10px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        
        .copper-button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #5c2e0b, 0 2px 4px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.3);
        }

        .rope-accent {
            border-bottom: 4px dashed #8b7355;
            opacity: 0.7;
        }
