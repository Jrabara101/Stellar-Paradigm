<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Vintage Grid Scramble</title>
<style>
        :root {
            /* Vintage Parchment & Mahogany Palette */
            --board-bg: #e8dcc4;
            --mahogany-light: #8b3a2b;
            --mahogany: #5c2e16;
            --mahogany-dark: #3a1a0b;
            --parchment: #f4e8d2;
            --ink: #2b1d14;
            --burnt-orange: #c85a17;
            --ivory: #fffff0;
            
            --highlight: rgba(255, 255, 255, 0.5);
            --shadow-deep: rgba(43, 29, 20, 0.4);
            --shadow-crisp: rgba(0, 0, 0, 0.2);
        }

        body {
            margin: 0; 
            background-color: #2b1d14; 
            background-image: 
                radial-gradient(circle at 50% 50%, #3a1a0b 0%, #1a0b05 100%);
            color: var(--ink);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
            user-select: none; touch-action: none;
        }

        .game-container {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* The Main Wooden Board Component - Mahogany Frame */
        .board-plate {
            background: var(--board-bg); 
            padding: 24px;
            border-radius: 8px; 
            border: 16px solid var(--mahogany);
            outline: 4px solid var(--mahogany-dark);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.6), 
                inset 0 0 40px rgba(92, 46, 22, 0.3),
                inset 0 2px 5px var(--highlight);
            display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center;
            position: relative;
        }

        /* 10x10 Grid Map */
        .grid-board {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            grid-template-rows: repeat(10, 50px);
            gap: 6px;
            background: rgba(92, 46, 22, 0.15);
            padding: 12px;
            border: 2px solid rgba(92, 46, 22, 0.4);
            border-radius: 6px;
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.3);
        }

        .grid-cell {
            width: 50px; height: 50px; 
            background-color: rgba(220, 205, 180, 0.3);
            box-sizing: border-box;
            border-radius: 4px;
            /* Deep inner shadows for skeuomorphic depth */
            box-shadow: inset 3px 3px 8px rgba(0,0,0,0.4), inset -2px -2px 4px rgba(255,255,255,0.4);
        }
        
        .target-cell {
            background-color: rgba(200, 90, 23, 0.15);
            border: 1px solid rgba(200, 90, 23, 0.5);
            box-shadow: inset 0 0 10px rgba(200, 90, 23, 0.1);
        }
    </style>
</head>
<body>
<div class="game-container">
<div class="board-plate" id="main-board-container">
<div class="grid-board" id="main-grid">
<!-- Grid cells generated by JS -->
</div>
</div>
</div>
<script>
    const mainGrid = document.getElementById('main-grid');
    // Generate 10x10 routed grid
    for (let i = 0; i < 100; i++) {
        let cell = document.createElement('div');
        cell.className = 'grid-cell';
        mainGrid.appendChild(cell);
    }
</script>
</body></html>
